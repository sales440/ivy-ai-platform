steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ivy-meta-agent-installer', '.']

  # 2. Push the image to Container Registry / Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ivy-meta-agent-installer']

  # 3. (Option A) Run the installer directly via Cloud Build (Good for ephemeral execution)
  - name: 'gcr.io/$PROJECT_ID/ivy-meta-agent-installer'
    args: ['--env', 'prod']
    env:
      - 'GCP_PROJECT=$PROJECT_ID'
    # secretEnv: ['IVY_API_KEY'] # If using secretEnv directly in build

  # 4. (Option B) Deploy as a Cloud Run Job (Better for scheduled/repeatable execution)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: gcloud
  #   args: ['beta', 'run', 'jobs', 'create', 'ivy-installer-job', '--image', 'gcr.io/$PROJECT_ID/ivy-meta-agent-installer', '--region', 'us-central1']

images:
  - 'gcr.io/$PROJECT_ID/ivy-meta-agent-installer'

options:
  logging: CLOUD_LOGGING_ONLY
